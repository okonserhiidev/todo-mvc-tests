name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: UI tests (Chrome headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          mvn-toolchain-id: temurin_17

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # Defaults live in src/test/resources/selenide.properties (browser, headless,
      # baseUrl, timeout, browserSize, screenshots, savePageSource, fastSetValue)
      # plus src/test/resources/allure.properties (results dir).
      # CI overrides:
      #   -Dthreads=4              → bump Surefire threadCount above the local default of 3
      #   -Dchromeoptions.args=    → clear the macOS-only MacAppCodeSignClone flag (no-op
      #                              on Linux but kept clean)
      # Any other selenide.* property can be overridden the same way, e.g.
      # -Dselenide.headless=false for a debugging run.
      - name: Run tests
        run: ./mvnw -B -ntp clean test -Dthreads=4 -Dchromeoptions.args=--no-sandbox

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 14

      - name: Upload Selenide screenshots & logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenide-reports
          path: target/selenide-reports
          retention-days: 14

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 14

  report:
    name: Publish Allure report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Load Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.14
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish report to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true
